<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <svg viewBox="0 0 122 25" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="m17.113 13.843-7.015 10.732L.58 9.79a2.981 2.981 0 0 1 .883-4.111 2.951 2.951 0 0 1 4.092.885l4.548 7.087 4.52-7.074.02-.028c.043-.064.087-.122.126-.174l.058-.077a1.96 1.96 0 0 1 .107-.12l.046-.052.046-.05c.018-.018.038-.036.064-.059l.065-.06c.035-.032.065-.06.095-.084l.081-.06c.059-.045.11-.084.173-.125l.026-.017.05-.03c.055-.032.108-.065.165-.095l.065-.032.056-.026c.045-.021.09-.042.134-.06.046-.02.091-.035.152-.057.048-.016.08-.028.113-.037a2.961 2.961 0 0 1 2.097.148l.051.025c.085.038.166.083.244.134l.05.028.025.016c.065.043.115.08.178.128l.077.058c.037.03.07.06.11.097l.067.061.048.045.055.06.052.058c.038.04.068.073.094.106l.062.082c.045.06.083.111.126.175l.012.017 4.53 7.08 4.542-7.088a2.952 2.952 0 0 1 4.092-.885 2.982 2.982 0 0 1 .883 4.11l-9.517 14.787-7.031-10.733h.001Zm27.14-8.849c-5.678 0-10.297 4.453-10.297 9.926 0 5.475 4.62 9.93 10.297 9.93 5.678 0 10.297-4.455 10.297-9.93 0-5.473-4.619-9.926-10.297-9.926m0 14.807c-2.52 0-4.572-2.19-4.572-4.88s2.051-4.88 4.572-4.88c2.523 0 4.575 2.19 4.575 4.88s-2.052 4.88-4.575 4.88M56.24 12.28v12.166h5.967v-12.55c0-.51.376-1.319 1.386-1.319l1.907-.003 1.967-.003V5.394h-4.214c-3.387 0-7.013 2.767-7.013 6.885m21.404-1.675a2.617 2.617 0 0 0 2.613-2.61 2.61 2.61 0 0 0-2.613-2.6h-2.778l-.001-2.582a2.795 2.795 0 0 0-2.8-2.785 2.795 2.795 0 0 0-2.798 2.785v15.255l.009.407h.007c.24 3.921 3.477 5.97 6.606 5.97h4.213v-5.17l-.406-.006c-.191-.002-3.279-.007-3.466-.007-1.038 0-1.387-1.03-1.387-1.499v-7.155c.78-.003 1.778-.003 2.801-.003m41.98-2.056c-1.288-1.62-3.659-3.55-7.635-3.55-3.974 0-6.343 1.93-7.631 3.55-1.68 2.111-2.278 4.6-2.278 6.224v9.673h5.974v-9.477c0-2.164 1.352-4.358 3.934-4.363 2.588.005 3.942 2.199 3.942 4.363v9.477h5.972v-9.673c0-1.625-.598-4.113-2.277-6.224M90.617 4.994c-5.529 0-10.027 4.453-10.027 9.926 0 5.475 4.498 9.93 10.027 9.93 3.868 0 7.432-2.247 9.08-5.723l.278-.584H94.29l-.122.135c-.777.861-2.171 1.418-3.552 1.418-2.116 0-3.713-1.262-4.317-3.39h14.186l.052-.35c.07-.474.106-.957.106-1.436 0-5.473-4.498-9.926-10.027-9.926h.001Zm-4.165 7.517c.5-1.664 2.138-2.764 4.165-2.764 2.009 0 3.68 1.124 4.164 2.764h-8.329Z" fill="#FFF" fill-rule="nonzero"/>
    </svg>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>

  <!-- CART CONTENT -->
  <div class="cart-content" id="cartContent">
    <!-- Rendered by JS -->
  </div>

  <!-- FOOTER -->
  <div class="store-footer">
    <p>Worten - Eletrónica Online, S.A.<br>Todos os preços incluem IVA à taxa legal em vigor.</p>
  </div>
</div>

<script>
// ========== ORDER BUMPS ==========
const orderBumps = [
  {
    id: 'adaptador',
    name: 'Adaptador APPLE Usb-C Power (20W)',
    img: 'assets/images/products/bumps/adaptador.jpg',
    price: '24,99'
  },
  {
    id: 'cabo',
    name: 'Cabo de Carregamento APPLE 60W Usb-C (1 M - Branco)',
    img: 'assets/images/products/bumps/cabo.webp',
    price: '25,99'
  }
];

// ========== LOAD CART ==========
let cart = JSON.parse(localStorage.getItem('wortenCart') || '[]');

function parsePrice(str) {
  return parseFloat(str.replace('.', '').replace(',', '.'));
}

function formatPrice(val) {
  return val.toFixed(2).replace('.', ',');
}

function getCartSubtotal() {
  return cart.reduce((sum, item) => sum + parsePrice(item.price) * item.qty, 0);
}

function renderCart() {
  const el = document.getElementById('cartContent');

  if (!cart.length) {
    el.innerHTML = `
      <div class="cart-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="#ccc" stroke-width="1.5"/><path d="M16 10a4 4 0 01-8 0" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <p>O seu carrinho está vazio</p>
        <a href="loja.html" class="cart-back-btn">VER PRODUTOS</a>
      </div>`;
    return;
  }

  const totalItems = cart.reduce((s, i) => s + i.qty, 0);

  // Build product cards HTML
  let cardsHtml = '';
  cart.forEach((item, index) => {
    const [euros, cents] = item.price.split(',');
    cardsHtml += `
      <div class="cart-card">
        <div class="cart-card-top">
          <div class="cart-card-img">
            <img src="${item.img}" alt="${item.name}">
          </div>
          <div class="cart-card-info">
            <div class="cart-card-name">${item.name}</div>
            <div class="cart-card-seller">Vendido por <strong>${item.seller || 'WORTEN'}</strong></div>
            ${item.oldPrice ? `<div class="cart-card-prices">
              <span class="cart-old-price">&euro;${item.oldPrice}</span>
              <span class="cart-discount-badge">${item.discount}</span>
            </div>` : ''}
            <div class="cart-current-price">
              <span class="cart-currency">&euro;</span>
              <span class="cart-euros">${euros}</span>
              <span class="cart-cents">,${cents}</span>
            </div>
          </div>
        </div>
        <div class="cart-card-delivery">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="#00a650" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>${item.delivery || 'Em 1 a 2 dias úteis'}</span>
          <span class="cart-free">Grátis</span>
        </div>
        <div class="cart-qty">
          <span>Quantidade:</span>
          <div class="cart-qty-controls">
            <button class="qty-btn" data-action="minus" data-index="${index}">-</button>
            <span class="qty-value">${item.qty}</span>
            <button class="qty-btn" data-action="plus" data-index="${index}">+</button>
          </div>
          <button class="cart-remove" data-index="${index}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>`;
  });

  // Check if any iPhone in cart for order bumps
  const hasIphone = cart.some(i => i.id && (i.id.includes('iphone')));

  let bumpsHtml = '';
  if (hasIphone) {
    bumpsHtml = `
      <div class="cart-bumps">
        <div class="bumps-title">Garante tudo o que precisas</div>
        ${orderBumps.map(b => `
          <label class="bump-option" data-bump-id="${b.id}">
            <input type="checkbox" class="bump-check" data-id="${b.id}" data-price="${b.price}" ${cart.some(c => c.id === b.id) ? 'checked' : ''}>
            <div class="bump-img"><img src="${b.img}" alt="${b.name}"></div>
            <div class="bump-info">
              <span class="bump-price">&euro;${b.price}</span>
              <span class="bump-name">${b.name}</span>
            </div>
          </label>
        `).join('')}
      </div>`;
  }

  const subtotal = getCartSubtotal();

  el.innerHTML = `
    <div class="cart-header-bar">
      <a href="loja.html" class="cart-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <h2>O meu carrinho <span class="cart-count">(${totalItems})</span></h2>
    </div>

    ${cardsHtml}

    ${bumpsHtml}

    <!-- WORTEN RESOLVE -->
    <div class="cart-resolve">
      <div class="resolve-header" id="resolveToggle">
        <div class="resolve-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#CC0033" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Worten Resolve</span>
        </div>
        <svg class="resolve-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="resolve-body" id="resolveBody">
        <label class="resolve-option">
          <input type="checkbox" id="chkSeguro" value="7.99">
          <div class="resolve-option-info">
            <span class="resolve-option-name">Seguro Worten Resolve</span>
            <span class="resolve-option-desc">Proteção contra danos acidentais e avarias</span>
          </div>
          <span class="resolve-option-price">&euro;7,99</span>
        </label>
        <label class="resolve-option">
          <input type="checkbox" id="chkMontagem" value="20.99">
          <div class="resolve-option-info">
            <span class="resolve-option-name">Serviço de Montagem</span>
            <span class="resolve-option-desc">Instalação e configuração por técnico certificado</span>
          </div>
          <span class="resolve-option-price">&euro;20,99</span>
        </label>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summarySubtotal">&euro;${formatPrice(subtotal)}</span>
      </div>
      <div class="summary-row">
        <span>Portes de envio</span>
        <span class="summary-free">Grátis</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-row summary-total">
        <span>Total</span>
        <span id="summaryTotal">&euro;${formatPrice(subtotal)}</span>
      </div>
      <div class="summary-iva">Inclui IVA a taxa legal em vigor</div>
    </div>

    <!-- PAYMENT ICONS -->
    <div class="cart-payments">
      <span class="pay-label">Métodos de pagamento aceites</span>
      <div class="pay-icons">
        <div class="pay-icon"><img src="assets/images/mbway-logo.png" alt="MB WAY" style="height:22px;"></div>
        <div class="pay-icon"><img src="assets/images/multibanco-logo.png" alt="Multibanco" style="height:22px;"></div>
      </div>
    </div>

    <!-- CHECKOUT BUTTON -->
    <div class="cart-checkout-bar">
      <button class="cart-checkout-btn" id="checkoutBtn">FINALIZAR COMPRA</button>
    </div>
  `;

  // ========== EVENT LISTENERS ==========

  // Qty buttons
  document.querySelectorAll('.qty-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.index);
      const action = this.dataset.action;
      if (action === 'plus') {
        cart[idx].qty++;
      } else if (action === 'minus' && cart[idx].qty > 1) {
        cart[idx].qty--;
      }
      saveAndUpdate();
    });
  });

  // Remove buttons
  document.querySelectorAll('.cart-remove').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.index);
      cart.splice(idx, 1);
      saveAndUpdate();
    });
  });

  // Resolve toggle
  document.getElementById('resolveToggle').addEventListener('click', function() {
    document.getElementById('resolveBody').classList.toggle('open');
    this.querySelector('.resolve-arrow').classList.toggle('open');
  });

  // Resolve checkboxes
  document.getElementById('chkSeguro').addEventListener('change', updateTotal);
  document.getElementById('chkMontagem').addEventListener('change', updateTotal);

  // Order bump checkboxes
  document.querySelectorAll('.bump-check').forEach(chk => {
    chk.addEventListener('change', function() {
      const bumpId = this.dataset.id;
      const bump = orderBumps.find(b => b.id === bumpId);
      if (this.checked) {
        // Add bump to cart
        cart.push({
          id: bump.id,
          name: bump.name,
          img: bump.img,
          price: bump.price,
          oldPrice: null,
          discount: null,
          delivery: 'Em 1 a 2 dias úteis',
          deliveryFree: true,
          seller: 'WORTEN',
          qty: 1
        });
        // AddToCart pixel
        if (typeof fbq === 'function') {
          fbq('track', 'AddToCart', { content_name: bump.name, value: bump.price, currency: 'EUR' });
        }
      } else {
        // Remove bump from cart
        cart = cart.filter(c => c.id !== bumpId);
      }
      saveAndUpdate();
    });
  });

  // Checkout
  document.getElementById('checkoutBtn').addEventListener('click', function() {
    updateTotal();
    location.href = 'checkout.html';
  });

  // Init total
  updateTotal();
}

function updateTotal() {
  const subtotal = getCartSubtotal();
  let extra = 0;
  const seguro = document.getElementById('chkSeguro');
  const montagem = document.getElementById('chkMontagem');
  if (seguro && seguro.checked) extra += 7.99;
  if (montagem && montagem.checked) extra += 20.99;
  const total = subtotal + extra;

  const subEl = document.getElementById('summarySubtotal');
  const totEl = document.getElementById('summaryTotal');
  if (subEl) subEl.textContent = `\u20AC${formatPrice(subtotal)}`;
  if (totEl) totEl.textContent = `\u20AC${formatPrice(total)}`;

  localStorage.setItem('wortenCart', JSON.stringify(cart));
  localStorage.setItem('wortenResolve', JSON.stringify({
    seguro: seguro ? seguro.checked : false,
    montagem: montagem ? montagem.checked : false,
    extra: extra
  }));
  localStorage.setItem('wortenTotal', total.toFixed(2));
}

function saveAndUpdate() {
  localStorage.setItem('wortenCart', JSON.stringify(cart));
  renderCart();
}

// Init
renderCart();
</script>

<script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>

</body>
