    <div class="step-line"></div>
    <div class="step" data-step="3"><span>3</span></div>
    <div class="step-line"></div>

    <div class="step-line"></div>

  <!-- CHECKOUT CONTENT -->
  <div class="checkout-content" id="checkoutContent"></div>

    <p>Worten - Eletrónica Online, S.A.<br>Todos os preços incluem IVA à taxa legal em vigor.</p>

<script>
// ========== DATA ==========
const cart = JSON.parse(localStorage.getItem('wortenCart') || '[]');
const resolve = JSON.parse(localStorage.getItem('wortenResolve') || '{}');
let totalBase = parseFloat(localStorage.getItem('wortenTotal') || '0');

if (!cart.length) { location.href = 'carrinho.html'; }

let currentStep = 1;

function cartItemsHtml() {
  return cart.map(item => `
    <div class="ck-summary-item">
      <img src="${item.img}" alt="${item.name}">
      <div class="ck-summary-item-info">
        <div class="ck-summary-item-name">${item.name}${item.qty > 1 ? ' x' + item.qty : ''}</div>
        <div class="ck-summary-item-price">&euro;${item.price}</div>
      </div>
    </div>
  `).join('');
}

function reviewProductsHtml() {
  return cart.map(item => `
    <div class="ck-review-product">
      <img src="${item.img}" alt="${item.name}">
      <div>
        <div class="ck-review-pname">${item.name}${item.qty > 1 ? ' x' + item.qty : ''}</div>
        <div class="ck-review-pprice">&euro;${item.price}</div>
      </div>
    </div>
  `).join('');
}

const checkoutData = {
  nome: '', apelido: '', nif: '', telemovel: '', email: '',
  morada: '', codigoPostal: '', cidade: '', pais: 'Portugal',
  entregaMorada: true,
  entregaMoradaData: {},
  envio: 'standard', envioPreco: 0,
  pagamento: '', mbwayPhone: '',
  totalFinal: totalBase
};

// ========== PROGRESS BAR ==========
function updateProgress(step) {
  document.querySelectorAll('.progress-bar .step').forEach((el, i) => {
    el.classList.toggle('active', i < step);
    el.classList.toggle('current', i + 1 === step);
  });
  document.querySelectorAll('.progress-bar .step-line').forEach((el, i) => {
    el.classList.toggle('active', i < step - 1);
  });
}

// ========== RENDER STEPS ==========
function renderStep(step) {
  currentStep = step;
  updateProgress(step);
  const content = document.getElementById('checkoutContent');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  switch(step) {
    case 1: renderStep1(content); break;
    case 2: renderStep2(content); break;
    case 3: renderStep3(content); break;
    case 4: renderStep4(content); break;
    case 5: renderStep5(content); break;
  }
}

// ========== STEP 1: DADOS DE FATURACAO ==========
function renderStep1(el) {
  el.innerHTML = `
    <div class="ck-section">
      <h3 class="ck-title">Dados de Faturação</h3>
      <p class="ck-subtitle">Preencha os seus dados de faturação</p>

      <div class="ck-form">
        <div class="ck-row">
          <div class="ck-field">
            <label>Nome *</label>
            <input type="text" id="fNome" placeholder="Nome" value="${checkoutData.nome}">
          </div>
          <div class="ck-field">
            <label>Apelido *</label>
            <input type="text" id="fApelido" placeholder="Apelido" value="${checkoutData.apelido}">
          </div>
        </div>
        <div class="ck-field">
          <label>NIF <span class="optional">(opcional)</span></label>
          <input type="text" id="fNif" placeholder="Número de contribuinte" value="${checkoutData.nif}" maxlength="9">
        </div>
        <div class="ck-field">
          <label>Telemóvel *</label>
          <div class="ck-phone-input">
            <span class="ck-phone-prefix">+351</span>
            <input type="tel" id="fTelemóvel" placeholder="912 345 678" value="${checkoutData.telemovel}" maxlength="9">
          </div>
        </div>
        <div class="ck-field">
          <label>Email *</label>
          <input type="email" id="fEmail" placeholder="email@exemplo.com" value="${checkoutData.email}">
        </div>
        <div class="ck-field">
          <label>Morada *</label>
          <input type="text" id="fMorada" placeholder="Rua, número, andar" value="${checkoutData.morada}">
        </div>
        <div class="ck-row">
          <div class="ck-field">
            <label>Código Postal *</label>
            <input type="text" id="fCodPostal" placeholder="1000-001" value="${checkoutData.codigoPostal}" maxlength="8">
          </div>
          <div class="ck-field">
            <label>Cidade *</label>
            <input type="text" id="fCidade" placeholder="Lisboa" value="${checkoutData.cidade}">
          </div>
        </div>
        <div class="ck-field">
          <label>País</label>
          <div class="ck-country">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'%3E%3Crect width='1.2' height='2' fill='%23006600'/%3E%3Crect x='1.2' width='1.8' height='2' fill='%23FF0000'/%3E%3Ccircle cx='1.2' cy='1' r='.4' fill='%23FFD700'/%3E%3C/svg%3E" alt="PT" width="20" height="14">
            Portugal
          </div>
        </div>
      </div>
    </div>

    <!-- ORDER SUMMARY DRAWER -->
    <div class="ck-summary-drawer">
      <div class="ck-summary-toggle" id="summaryToggle">
        <span>Resumo da Compra</span>
        <div class="ck-summary-toggle-right">
          <strong>&euro;${formatPrice(checkoutData.totalFinal)}</strong>
          <svg class="ck-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="ck-summary-body" id="summaryBody">
        ${cartItemsHtml()}
        ${resolve.seguro ? '<div class="ck-summary-extra"><span>Seguro Worten Resolve</span><span>&euro;7,99</span></div>' : ''}
        ${resolve.montagem ? '<div class="ck-summary-extra"><span>Serviço de Montagem</span><span>&euro;20,99</span></div>' : ''}
        <div class="ck-summary-line"></div>
        <div class="ck-summary-total"><span>Total</span><strong>&euro;${formatPrice(checkoutData.totalFinal)}</strong></div>
      </div>
    </div>

    <div class="ck-btn-bar">
      <button class="ck-btn" id="btnStep1">CONTINUAR</button>
    </div>
  `;

  document.getElementById('summaryToggle').addEventListener('click', function() {
    document.getElementById('summaryBody').classList.toggle('open');
    this.querySelector('.ck-arrow').classList.toggle('open');
  });

  document.getElementById('btnStep1').addEventListener('click', function() {
    const nome = document.getElementById('fNome').value.trim();
    const apelido = document.getElementById('fApelido').value.trim();
    const tel = document.getElementById('fTelemóvel').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    const morada = document.getElementById('fMorada').value.trim();
    const codPostal = document.getElementById('fCodPostal').value.trim();
    const cidade = document.getElementById('fCidade').value.trim();

    if (!nome || !apelido || !tel || !email || !morada || !codPostal || !cidade) {
      showError('Preencha todos os campos obrigatórios');
      return;
    }

    checkoutData.nome = nome;
    checkoutData.apelido = apelido;
    checkoutData.nif = document.getElementById('fNif').value.trim();
    checkoutData.telemovel = tel;
    checkoutData.email = email;
    checkoutData.morada = morada;
    checkoutData.codigoPostal = codPostal;
    checkoutData.cidade = cidade;

    renderStep(2);
  });
}

// ========== STEP 2: LOCAL DE ENTREGA ==========
function renderStep2(el) {
  el.innerHTML = `
    <div class="ck-section">
      <h3 class="ck-title">Local de Entrega</h3>
      <p class="ck-subtitle">Escolha onde pretende receber a sua encomenda</p>

      <div class="ck-delivery-option selected">
        <div class="ck-radio-circle active"></div>
        <div class="ck-delivery-option-info">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V12h6v10" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>
            <strong>Morada</strong>
            <span>Receba a sua encomenda na morada indicada</span>
          </div>
        </div>
      </div>

      <div class="ck-address-form">
        <label class="ck-checkbox-label">
          <input type="checkbox" id="chkSameBilling" checked>
          <span>Igual à morada de faturação</span>
        </label>
        <div class="ck-address-fields" id="deliveryFields" style="display:none">
          <div class="ck-field">
            <label>Morada *</label>
            <input type="text" id="dMorada" placeholder="Rua, número, andar">
          </div>
          <div class="ck-row">
            <div class="ck-field">
              <label>Código Postal *</label>
              <input type="text" id="dCodPostal" placeholder="1000-001" maxlength="8">
            </div>
            <div class="ck-field">
              <label>Cidade *</label>
              <input type="text" id="dCidade" placeholder="Lisboa">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="ck-btn-bar">
      <button class="ck-btn-back" id="btnBack2">VOLTAR</button>
      <button class="ck-btn" id="btnStep2">CONTINUAR</button>
    </div>
  `;

  const chk = document.getElementById('chkSameBilling');
  const fields = document.getElementById('deliveryFields');
  chk.addEventListener('change', () => {
    fields.style.display = chk.checked ? 'none' : 'block';
  });

  document.getElementById('btnBack2').addEventListener('click', () => renderStep(1));
  document.getElementById('btnStep2').addEventListener('click', function() {
    if (chk.checked) {
      checkoutData.entregaMoradaData = {
        morada: checkoutData.morada,
        codigoPostal: checkoutData.codigoPostal,
        cidade: checkoutData.cidade
      };
    } else {
      const m = document.getElementById('dMorada').value.trim();
      const cp = document.getElementById('dCodPostal').value.trim();
      const c = document.getElementById('dCidade').value.trim();
      if (!m || !cp || !c) {
        showError('Preencha a morada de entrega completa');
        return;
      }
      checkoutData.entregaMoradaData = { morada: m, codigoPostal: cp, cidade: c };
    }
    renderStep(3);
  });
}

// ========== STEP 3: OPCOES DE ENTREGA ==========
function renderStep3(el) {
  el.innerHTML = `
    <div class="ck-section">
      <h3 class="ck-title">Opções de Entrega</h3>
      <p class="ck-subtitle">Escolha o método de envio</p>

      <label class="ck-shipping-option" id="optStandard">
        <input type="radio" name="shipping" value="standard" checked>
        <div class="ck-shipping-info">
          <div class="ck-shipping-top">
            <strong>Entrega Standard</strong>
            <span class="ck-shipping-free">Grátis</span>
          </div>
          <span class="ck-shipping-desc">Em 1 a 2 dias úteis</span>
        </div>
      </label>

      <label class="ck-shipping-option" id="optExpress">
        <input type="radio" name="shipping" value="express">
        <div class="ck-shipping-info">
          <div class="ck-shipping-top">
            <strong>Entrega no Mesmo Dia</strong>
            <span class="ck-shipping-price">&euro;14,00</span>
          </div>
          <span class="ck-shipping-desc">Entrega em 4 horas após confirmação</span>
        </div>
      </label>
    </div>

    <div class="ck-btn-bar">
      <button class="ck-btn-back" id="btnBack3">VOLTAR</button>
      <button class="ck-btn" id="btnStep3">CONTINUAR</button>
    </div>
  `;

  document.getElementById('btnBack3').addEventListener('click', () => renderStep(2));
  document.getElementById('btnStep3').addEventListener('click', function() {
    const selected = document.querySelector('input[name="shipping"]:checked').value;
    checkoutData.envio = selected;
    checkoutData.envioPreco = selected === 'express' ? 14.00 : 0;
    checkoutData.totalFinal = totalBase + checkoutData.envioPreco;
    renderStep(4);
  });
}

// ========== STEP 4: PAGAMENTO ==========
function renderStep4(el) {
  el.innerHTML = `
    <div class="ck-section">
      <h3 class="ck-title">Método de Pagamento</h3>
      <p class="ck-subtitle">Escolha como pretende efetuar o pagamento</p>

      <label class="ck-pay-option" id="optMbway">
        <input type="radio" name="payment" value="mbway">
        <div class="ck-pay-icon">
          <img src="assets/images/mbway-logo.png" alt="MB WAY" class="ck-pay-logo">
        </div>
        <div class="ck-pay-info">
          <strong>MB WAY</strong>
          <span>Pagamento instantâneo pelo telemóvel</span>
        </div>
      </label>
      <div class="ck-pay-phone-wrap" id="mbwayPhoneWrap" style="display:none">
        <div class="ck-field">
          <label>Número de telemóvel MB WAY</label>
          <div class="ck-phone-input">
            <span class="ck-phone-prefix">+351</span>
            <input type="tel" id="mbwayPhone" placeholder="912 345 678" maxlength="9" value="${checkoutData.mbwayPhone}">
          </div>
        </div>
      </div>

      <label class="ck-pay-option" id="optMultibanco">
        <input type="radio" name="payment" value="multibanco">
        <div class="ck-pay-icon">
          <img src="assets/images/multibanco-logo.png" alt="Multibanco" class="ck-pay-logo">
        </div>
        <div class="ck-pay-info">
          <strong>Referência Multibanco</strong>
          <span>Pague por referência numa caixa ATM ou homebanking</span>
        </div>
      </label>
    </div>

    <div class="ck-btn-bar">
      <button class="ck-btn-back" id="btnBack4">VOLTAR</button>
      <button class="ck-btn" id="btnStep4">CONTINUAR</button>
    </div>
  `;

  const radios = document.querySelectorAll('input[name="payment"]');
  const phoneWrap = document.getElementById('mbwayPhoneWrap');

  radios.forEach(r => r.addEventListener('change', function() {
    phoneWrap.style.display = this.value === 'mbway' ? 'block' : 'none';
    document.querySelectorAll('.ck-pay-option').forEach(o => o.classList.remove('selected'));
    this.closest('.ck-pay-option').classList.add('selected');
  }));

  document.getElementById('btnBack4').addEventListener('click', () => renderStep(3));
  document.getElementById('btnStep4').addEventListener('click', function() {
    const selected = document.querySelector('input[name="payment"]:checked');
    if (!selected) {
      showError('Selecione um método de pagamento');
      return;
    }
    checkoutData.pagamento = selected.value;
    if (selected.value === 'mbway') {
      const phone = document.getElementById('mbwayPhone').value.trim();
      if (!phone || phone.length < 9) {
        showError('Introduza o número de telemóvel MB WAY');
        return;
      }
      checkoutData.mbwayPhone = phone;
    }
    renderStep(5);
  });
}

// ========== STEP 5: CONFIRMA E FINALIZA ==========
function renderStep5(el) {
  const envioLabel = checkoutData.envio === 'express' ? 'Mesmo Dia (4h)' : 'Standard (1-2 dias)';
  const envioPrecoLabel = checkoutData.envio === 'express' ? '&euro;14,00' : 'Grátis';
  const pagLabel = checkoutData.pagamento === 'mbway' ? 'MB WAY' : 'Referência Multibanco';

  el.innerHTML = `
    <div class="ck-section">
      <div style="margin:0 0 16px;border-radius:8px;overflow:hidden;">
        <img src="assets/images/capa checkout.png" alt="Oferta" style="width:100%;display:block;">
      </div>
      <h3 class="ck-title">Confirmar Encomenda</h3>
      <p class="ck-subtitle">Reveja os dados antes de finalizar</p>

      <!-- Products -->
      <div class="ck-review-card">
        ${reviewProductsHtml()}
      </div>

      <!-- Billing -->
      <div class="ck-review-card">
        <div class="ck-review-label">Dados de Faturação</div>
        <div class="ck-review-text">${checkoutData.nome} ${checkoutData.apelido}</div>
        <div class="ck-review-text">${checkoutData.morada}</div>
        <div class="ck-review-text">${checkoutData.codigoPostal} ${checkoutData.cidade}</div>
        <div class="ck-review-text">${checkoutData.telemovel}</div>
        <div class="ck-review-text">${checkoutData.email}</div>
      </div>

      <!-- Delivery -->

      <div class="ck-review-card">

          <span class="ck-review-label">Envio</span>

      <!-- Payment -->
      <div class="ck-review-card">
        <div class="ck-review-row">
          <span class="ck-review-label">Pagamento</span>
          <span>${pagLabel}</span>
        </div>
      </div>

      <!-- Total -->

    </div>
  `;

  document.getElementById('btnBack5').addEventListener('click', () => renderStep(4));
  document.getElementById('btnFinalize').addEventListener('click', processPayment);
}

// ========== PAYMENT PROCESSING ==========
async function processPayment() {
  const btn = document.getElementById('btnFinalize');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = 'A PROCESSAR...';

  // Captura cookies do Meta Pixel e UTMs
  function getCookie(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : null;
  }
  function getUTM(param) {
    return new URLSearchParams(window.location.search).get(param) ||
           sessionStorage.getItem(param) || '';
  }

  const payload = {
    amount: checkoutData.totalFinal,
    method: checkoutData.pagamento,
    currency: 'EUR',
    payer: {
      email: checkoutData.email,
      name: `${checkoutData.nome} ${checkoutData.apelido}`,
      document: checkoutData.nif || '000000000',
      phone: `+351${checkoutData.mbwayPhone || checkoutData.telemovel}`
    },
    shipping: {
      address: checkoutData.morada,
      postal_code: checkoutData.codigoPostal,
      city: checkoutData.cidade,
      country: 'Portugal'
    },
    products: cart.map(item => ({
      name: item.name,
      price: item.price,
      quantity: item.qty || 1
    })),
    metadata: {
      fbp: getCookie('_fbp'),
      fbc: getCookie('_fbc'),
      utm_source: getUTM('utm_source'),
      utm_medium: getUTM('utm_medium'),
      utm_campaign: getUTM('utm_campaign'),
      utm_content: getUTM('utm_content'),
      utm_term: getUTM('utm_term')
    }
  };

  try {
    const res = await fetch('api/create_transaction.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    if (checkoutData.pagamento === 'mbway') {
      showMbwayConfirmation(data);
    } else {
      showMultibancoConfirmation(data);
    }
  } catch (err) {
    console.error('Payment API error:', err);
    btn.disabled = false;
    btn.textContent = 'FINALIZAR ENCOMENDA';
    showError('Erro ao processar pagamento. Tente novamente ou escolha outro método.');
    return;
  }
}

      </div>

  // Timer countdown

  const interval = setInterval(() => {

  const txnId = data.transactionID || data.id || data.reference || (data.transaction && data.transaction.id);
  console.log('WayMB response:', JSON.stringify(data));
  console.log('Transaction ID for polling:', txnId);

// ========== POLL STATUS ==========
async function pollPaymentStatus(txnId, timerInterval) {
  let errorCount = 0;
  const maxErrors = 6;
  const maxPolls = 60;
  let pollCount = 0;

  const pollInterval = setInterval(async () => {
    pollCount++;

    if (pollCount > maxPolls) {
      clearInterval(pollInterval);
      if (timerInterval) clearInterval(timerInterval);
      showPollError(txnId);
      return;
    }

    try {
      const res = await fetch('api/check_status.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: txnId })
      });
      if (!res.ok) {
        errorCount++;
        if (errorCount >= maxErrors) {
          clearInterval(pollInterval);
          if (timerInterval) clearInterval(timerInterval);
          showPollError(txnId);
        }
        return;
      }

      errorCount = 0;
      const data = await res.json();

      if (data.status === 'COMPLETED') {
        clearInterval(pollInterval);
        if (timerInterval) clearInterval(timerInterval);
        const statusEl = document.getElementById('paymentStatus');
        if (statusEl) {
          statusEl.innerHTML = `
            <div class="ck-status-dot completed"></div>
            <span>Pagamento confirmado com sucesso!</span>
          `;
        }

        // Dispara Purchase no browser (deduplicação com CAPI via eventID)
        if (typeof fbq === 'function') {
          fbq('track', 'Purchase', {
            value: checkoutData.totalFinal,
            currency: 'EUR'
          }, { eventID: txnId });
        }

        // Rastreio é criado pelo backend PHP (check_status.php) — não duplicar aqui

        // Salva dados para o upsell
        localStorage.setItem('purchaseComplete', 'true');
        localStorage.setItem('purchaseAmount', checkoutData.totalFinal);
        localStorage.setItem('customerEmail', checkoutData.email);
        localStorage.setItem('customerPhone', checkoutData.mbwayPhone || checkoutData.telemovel);
        localStorage.setItem('customerName', `${checkoutData.nome} ${checkoutData.apelido}`);

        localStorage.removeItem('wortenCart');
        localStorage.removeItem('wortenResolve');
        localStorage.removeItem('wortenTotal');

        // Redireciona para upsell após 2s
        setTimeout(() => {
          window.location.href = 'upsellPTtaxa.html';
        }, 2000);

      } else if (data.status === 'FAILED') {
        clearInterval(pollInterval);
        if (timerInterval) clearInterval(timerInterval);
        const statusEl = document.getElementById('paymentStatus');
        if (statusEl) {
          statusEl.innerHTML = `
            <div class="ck-status-dot expired"></div>
            <span>Pagamento falhou. <a href="checkout.html" style="color:#CC0033;font-weight:600">Tentar novamente</a></span>
          `;
        }
      }
    } catch(e) {
      errorCount++;
      if (errorCount >= maxErrors) {
        clearInterval(pollInterval);
        if (timerInterval) clearInterval(timerInterval);
        showPollError(txnId);
      }
    }
  }, 5000);
}

function showPollError(txnId) {
  const statusEl = document.getElementById('paymentStatus');
  if (statusEl) {
    statusEl.innerHTML = `
      <div class="ck-status-dot expired"></div>
      <span>Não foi possível verificar o pagamento.
        <a href="javascript:void(0)" onclick="location.reload()" style="color:#CC0033;font-weight:600">Tentar novamente</a>
        ou contacte o suporte com o ID: ${txnId}
      </span>
    `;
  }
}

// ========== HELPERS ==========
function formatPrice(val) {
  return Number(val).toFixed(2).replace('.', ',');
}

function formatReference(ref) {
  return ref.replace(/(\d{3})(\d{3})(\d{3})/, '$1 $2 $3');
}

function formatDate(dateStr) {
  if (!dateStr) return '--';
  const d = new Date(dateStr);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function showError(msg) {
  let toast = document.querySelector('.ck-error-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'ck-error-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
