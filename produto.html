// ========== RENDER STARS ==========
function renderStars(rating) {
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(rating)) {
      stars += '<span class="star full">&#9733;</span>';
    } else if (i - rating < 1 && i - rating > 0) {
      stars += '<span class="star half">&#9733;</span>';
    } else {
      stars += '<span class="star empty">&#9733;</span>';
    }
  }
  return stars;
}

// ========== RENDER REVIEW BARS ==========
function renderReviewBars(rating, reviews) {
  const dist = [
    Math.round(reviews * 0.55),
    Math.round(reviews * 0.22),
    Math.round(reviews * 0.10),
    Math.round(reviews * 0.03),
    Math.round(reviews * 0.10)
  ];
  let html = '';
  for (let i = 5; i >= 1; i--) {
    const count = dist[5 - i];
    const pct = reviews > 0 ? (count / reviews) * 100 : 0;
    html += `
      <div class="bar-row">
        <span class="bar-label">${i} estrelas</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="bar-count">${count}</span>
      </div>`;
  }
  return html;
}

// ========== RENDER RATING MINI BARS ==========
function renderMiniBar(value) {
  const segments = 5;
  let html = '<div class="mini-bar">';
  for (let i = 0; i < segments; i++) {
    const filled = value > i;
    html += `<div class="mini-seg ${filled ? 'filled' : ''}"></div>`;
  }
  html += `<span class="mini-val">${value.toFixed(1)}</span></div>`;
  return html;
}

    <div class="pd-img-counter">1 de 5</div>
  </div>

  <!-- TOP VENDAS BADGE -->
  <div class="pd-top-badge">
    <span class="pd-top-icon">&#128293;</span> Top Vendas da Semana!

  <!-- BEST PRICE BADGE -->

  </div>

  <!-- PRICE -->
  <div class="pd-price-section">
    <div class="pd-discount-badge">${product.discount}</div>
    <div class="pd-price-row">
      <div class="pd-old-price">&euro;${product.oldPrice}</div>

        <span class="pd-currency">&euro;</span>

    <div class="pd-delivery-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="1" y="3" width="15" height="13" rx="1" stroke="#333" stroke-width="1.5"/><path d="M16 8h4l3 4v5h-7V8z" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="18.5" r="2.5" stroke="#333" stroke-width="1.5"/><circle cx="18.5" cy="18.5" r="2.5" stroke="#333" stroke-width="1.5"/></svg>

  <!-- WARRANTY -->
  <div class="pd-warranty-section">

      <input type="checkbox" class="pd-warranty-check">

  <!-- SELLER INFO -->
  <div class="pd-seller-section">
    <div class="pd-seller-row">Vendido por <strong class="pd-seller-worten">worten</strong></div>
    <div class="pd-return-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#333" stroke-width="1.5"/><path d="M12 8v4l2 2" stroke="#333" stroke-width="1.5" stroke-linecap="round"/></svg>
      <div>
        <strong>Devolução grátis até 14 dias numa loja Worten</strong>
        <div class="pd-return-sub">Adere grátis ao Worten Life e tens até 30 dias para devolver<br><a class="pd-return-link">Saber mais</a></div>
      </div>

  <!-- ORDER BUMP (iPhones only) -->
  ${['iphone17promax','iphone17'].includes(product.id) ? `
  <div class="pd-orderbump-section">
    <div class="pd-orderbump-title">Garante tudo o que precisas</div>
    <div class="pd-orderbump-item">
      <input type="checkbox" class="pd-orderbump-check">
      <div class="pd-orderbump-img">
        <img src="assets/images/products/bumps/adaptador.jpg" alt="Adaptador">
      </div>
      <div class="pd-orderbump-info">
        <span class="pd-orderbump-price">&euro;24,99</span>
        <span class="pd-orderbump-name">Adaptador APPLE Usb-C Power (20W)</span>
      </div>
    </div>
    <div class="pd-orderbump-item">
      <input type="checkbox" class="pd-orderbump-check">
      <div class="pd-orderbump-img">
        <img src="assets/images/products/bumps/cabo.webp" alt="Cabo">
      </div>
      <div class="pd-orderbump-info">
        <span class="pd-orderbump-price">&euro;25,99</span>
        <span class="pd-orderbump-name">Cabo de Carregamento APPLE 60W Usb-C (1 M - Branco)</span>
      </div>
    </div>
    <div class="pd-orderbump-item pd-orderbump-simple">
      <input type="checkbox" class="pd-orderbump-check">
      <div class="pd-orderbump-info">
        <span>Adicionar <strong>Película Gel Ecrã</strong></span>
        <span class="pd-orderbump-price">&euro;29,99 ></span>
      </div>
    </div>
    <a class="pd-orderbump-link">Ver todas as opções</a>
  </div>
  ` : ''}

  <!-- ACCORDION SECTIONS -->
  <div class="pd-accordion">
    <div class="pd-accordion-item" onclick="this.classList.toggle('open')">
      <div class="pd-accordion-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#333" stroke-width="1.5"/><path d="M3 9h18M9 21V9" stroke="#333" stroke-width="1.5"/></svg>
        <span>Sobre o produto</span>
        <svg class="pd-accordion-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="pd-accordion-body">
        <p>${product.name}. Produto vendido e enviado por Worten com garantia oficial do fabricante.</p>
      </div>
    </div>

    <div class="pd-accordion-item" onclick="this.classList.toggle('open')">
      <div class="pd-accordion-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="2" stroke="#333" stroke-width="1.5"/><path d="M2 8h20M8 8v14M2 14h20" stroke="#333" stroke-width="1.5"/></svg>
        <span>Características técnicas</span>
        <svg class="pd-accordion-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="pd-accordion-body">
        <table class="pd-specs-table">
          ${product.specs.map(s => `<tr><td class="spec-label">${s.label}</td><td class="spec-value">${s.value}</td></tr>`).join('')}
        </table>
      </div>
    </div>

    <div class="pd-accordion-item" onclick="this.classList.toggle('open')">
      <div class="pd-accordion-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="#333" stroke-width="1.5"/><path d="M16 7V5a4 4 0 00-8 0v2" stroke="#333" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Ver stock em loja</span>
        <svg class="pd-accordion-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="pd-accordion-body">
        <p>Disponível em 23 lojas Worten. Consulte disponibilidade na loja mais próxima.</p>
      </div>
    </div>
  </div>

  <!-- REVIEWS SECTION -->
  <div class="pd-reviews-section">
    <h2 class="pd-reviews-title">Avaliações</h2>
    <div class="pd-reviews-summary">
      <p class="pd-reviews-subtitle">Resumo das avaliações</p>
      <p class="pd-reviews-filter-text">Seleciona uma linha abaixo para filtrar as avaliações.</p>
      <div class="pd-review-bars">
        ${renderReviewBars(product.rating, product.reviews)}
      </div>

      <div class="pd-global-rating">
        <div class="pd-global-label">Avaliação global</div>
        <div class="pd-global-row">
          <span class="pd-global-num">${product.rating}</span>
          <div class="pd-global-stars">${renderStars(product.rating)}</div>
          <a class="pd-global-count">${product.reviews} avaliações</a>
        </div>
        <div class="pd-recommend">${Math.min(Math.round(product.reviews * 0.83), product.reviews)} de ${product.reviews} (${recommend}%) clientes recomendam este produto</div>
      </div>

      <div class="pd-avg-ratings">
        <div class="pd-avg-title">Classificação média dos clientes</div>
        <div class="pd-avg-row">
          <span>Funcionalidades</span>
          ${renderMiniBar(4.9)}
        </div>
        <div class="pd-avg-row">
          <span>Qualidade</span>
          ${renderMiniBar(4.4)}
        </div>
        <div class="pd-avg-row">
          <span>Relação preço/qualidade</span>
          ${renderMiniBar(4.3)}
        </div>
      </div>
    </div>

    <!-- INDIVIDUAL REVIEWS -->
    <div class="pd-reviews-list">
      <div class="pd-reviews-count">1 - ${Math.min(5, product.reviews)} de ${product.reviews} avaliações</div>
      ${fakeReviewers.slice(0, Math.min(5, product.reviews)).map(r => `
        <div class="pd-review-card">
          <div class="pd-review-stars">${renderStars(r.rating)}</div>
          <div class="pd-review-author">${r.name}</div>
          <div class="pd-review-verified">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#4CAF50"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            COMPRA VERIFICADA
          </div>
          <div class="pd-review-date">há ${r.days} dias</div>
          <p class="pd-review-text">${r.text}</p>
          <div class="pd-review-recommend">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#333"/><path d="M8 12l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sim, Recomendo este produto.
          </div>
          <div class="pd-review-helpful">
            <span>Foi útil?</span>
            <span class="pd-helpful-btn">&#128077; (0)</span>
            <span class="pd-helpful-btn">&#128078; (0)</span>
            <a class="pd-report-link">Denunciar</a>
          </div>
          <div class="pd-review-mini-ratings">
            <div class="pd-mini-row"><span>Funcionalidades</span>${renderMiniBar(r.func)}</div>
            <div class="pd-mini-row"><span>Qualidade</span>${renderMiniBar(r.qual)}</div>
            <div class="pd-mini-row"><span>Relação preço/qualidade</span>${renderMiniBar(r.preco)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- BACK TO TOP -->
  <div class="pd-back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 15l-6-6-6 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    TOPO
  </div>
`;

// ========== STICKY BAR ==========
document.getElementById('stickyPrice').innerHTML = `&euro;${product.price}`;

// ========== ADD TO CART ==========
document.getElementById('stickyBtn').addEventListener('click', function() {
  const cartItem = {
    id: product.id,
    name: product.name,
    img: product.img,
    price: product.price,
    oldPrice: product.oldPrice,
    discount: product.discount,
    delivery: product.delivery,
    deliveryFree: product.deliveryFree,
    seller: product.seller,
    qty: 1
  };
  const existing = JSON.parse(localStorage.getItem('wortenCart') || '[]');
  const idx = existing.findIndex(c => c.id === cartItem.id);
  if (idx >= 0) {
    existing[idx].qty += 1;
  } else {
    existing.push(cartItem);
  }
  localStorage.setItem('wortenCart', JSON.stringify(existing));

  // AddToCart pixel
  if (typeof fbq === 'function') {
    fbq('track', 'AddToCart', {
      content_name: product.name,
      content_ids: [product.id],
      content_type: 'product',
      value: product.price,
      currency: 'EUR'
    });
  }

  location.href = 'carrinho.html';
});
</script>
<script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>
